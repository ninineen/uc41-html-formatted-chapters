<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AO3 Chapter Preview</title>
  <link rel="stylesheet" href="vendor/ao3-screen.css">
  <link rel="stylesheet" href="vendor/deworkskin.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/toolbar.css">
  <link rel="stylesheet" href="css/preview.css">
</head>
<body>

<div id="preview-toolbar" class="toolbar">
  <a href="comment-preview.html">comment preview &rarr;</a>
  <span class="sep">|</span>
  <label for="chapter-select">Chapter:</label>
  <select id="chapter-select" class="toolbar-select">
    <option value="">— pick a file —</option>
  </select>
  <label for="file-picker">or load file:</label>
  <input type="file" id="file-picker" class="toolbar-file" accept=".html">
  <button id="dark-toggle" class="toolbar-btn toolbar-spacer">&#9790; Dark</button>
</div>

<div id="main">
  <div id="workskin">
    <p class="workskin-placeholder">Select a formatted chapter above to preview it here.</p>
  </div>
</div>

<script type="module" src="js/preview.js"></script>
</body>
</html>
